name: Fetch Bitcoin Data

# REFERENCE POINT ONLY - see conversation record: backtested BTC-USD against the same
# three stress events as gold (2018 Q4, COVID, 2022). Unlike gold, BTC fell HARDER than
# SPY in every single one (-38.1% vs SPY -19.7% in 2018 Q4, -33.4% vs -34.1% in COVID,
# -58.8% vs -25.4% in 2022). This is not a hedge or contrarian signal - it behaves like
# a high-beta risk asset, often amplifying the same risk-off move equities make. Shown
# here as a reference point only. It does NOT feed calcComposite/computeSignposts, and
# should never be read as a safe-haven confirmation the way gold sometimes can be.
#
# BTC-USD trades 24/7, so unlike gold (which needed switching from GLD to GC=F futures
# to cover overnight moves), no ticker swap was needed here for Part II relevance.
#
# TO REMOVE: delete this file, delete data/bitcoin.json (optional), and in index.html
# delete the block between "BITCOIN SECTION START" and "BITCOIN SECTION END" (CSS/HTML/JS
# each bracketed the same way). Nothing else depends on this.

on:
  schedule:
    - cron: '0 12 * * 1-5'
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch BTC-USD price data
        run: |
          mkdir -p data
          python3 << 'PYEOF'
          import json
          import urllib.request
          import datetime

          HEADERS = {"User-Agent": "Mozilla/5.0 (compatible; MarketShockMonitor/1.0)"}
          URL = "https://query1.finance.yahoo.com/v8/finance/chart/BTC-USD?interval=1d&range=1mo"

          try:
              req = urllib.request.Request(URL, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=15) as r:
                  data = json.load(r)

              result = data["chart"]["result"][0]
              timestamps = result["timestamp"]
              closes = result["indicators"]["quote"][0]["close"]

              points = [(t, c) for t, c in zip(timestamps, closes) if c is not None]
              if len(points) < 2:
                  raise ValueError("not enough data points returned")

              current = points[-1][1]
              prev_close = points[-2][1]
              change_pct = (current - prev_close) / prev_close * 100

              def change_n_days_ago(n):
                  if len(points) <= n:
                      return None
                  past = points[-1 - n][1]
                  return (current - past) / past * 100

              out = {
                  "price": current,
                  "prevClose": prev_close,
                  "changePct": change_pct,
                  "change5d": change_n_days_ago(5),
                  "change20d": change_n_days_ago(20),
                  "_lastUpdated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "_source": "Yahoo Finance (BTC-USD)",
                  "_fetchFailed": False,
              }
              print(f"OK: BTC-USD = {current:.2f}, day {change_pct:+.2f}%, 5d {out['change5d']}, 20d {out['change20d']}")

          except Exception as e:
              print(f"FETCH FAILED: {e}")
              out = {"_fetchFailed": True, "_fetchError": str(e),
                     "_lastUpdated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")}

          with open("data/bitcoin.json", "w") as f:
              json.dump(out, f, indent=2)
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bitcoin.json
          git diff --cached --quiet || git commit -m "Update Bitcoin data [$(date -u +%Y-%m-%d)]"
          git push
