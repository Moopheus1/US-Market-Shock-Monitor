name: Fetch FRED Data

on:
  schedule:
    - cron: '0 16 * * *'  # Daily at 4pm UTC (≈ US market close)
  workflow_dispatch:       # Manual trigger button

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch FRED Data
        run: |
          mkdir -p data
          API_KEY="${{ secrets.FRED_API_KEY }}"

          fetch_series() {
            local series=$1
            local file=$2
            echo "Fetching ${series}..."
            curl -s "https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${API_KEY}&file_type=json&sort_order=desc&limit=200"               -o "data/${file}.json"
            # Verify it's valid JSON
            if ! python3 -c "import json; json.load(open('data/${file}.json'))" 2>/dev/null; then
              echo "WARNING: ${series} returned invalid JSON, keeping previous file if exists"
              git checkout -- "data/${file}.json" 2>/dev/null || true
            fi
          }

          # Core indicators
          fetch_series "VIXCLS"        "vix"
          fetch_series "DTWEXBGS"      "dxy"
          fetch_series "T10Y2Y"        "yield10y2y"
          fetch_series "DCOILWTICO"    "oil"
          fetch_series "CPIAUCSL"      "cpi"
          fetch_series "UNRATE"        "unemployment"
          fetch_series "BAMLH0A0HYM2"  "credit"
          fetch_series "WALCL"         "fedbal"
          fetch_series "UMCSENT"       "consumer"
          fetch_series "DGS10"         "treasury10y"
          fetch_series "DGS2"          "treasury2y"
          fetch_series "M2SL"          "m2"
          fetch_series "SP500"         "sp500"
          fetch_series "NASDAQCOM"     "nasdaq"

          # Also fetch a metadata file with last update timestamp
          echo '{"lastUpdated":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > data/meta.json

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update FRED data [$(date -u +%Y-%m-%d)]"
          git push
