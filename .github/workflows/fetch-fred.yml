name: Fetch FRED Data

on:
  schedule:
    # Run at 11:30 AM UTC = 6:30 AM ET (pre-market data refresh)
    # FRED publishes previous-day data early morning ET
    - cron: '30 11 * * *'
    # Also run at 9:00 PM UTC = 4:00 PM ET (right after market close)
    # Catches any same-day updates FRED publishes post-close
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch FRED Data
        run: |
          mkdir -p data
          API_KEY="${{ secrets.FRED_API_KEY }}"
          FAIL_COUNT=0
          TOTAL_COUNT=0
          FAILED_SERIES=""

          fetch_series() {
            local series=$1
            local file=$2
            TOTAL_COUNT=$((TOTAL_COUNT+1))
            echo "Fetching ${series}..."
            curl -s "https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${API_KEY}&file_type=json&sort_order=desc&limit=400"               -o "data/${file}.json"
            if ! python3 -c "import json; json.load(open('data/${file}.json'))" 2>/dev/null; then
              echo "WARNING: ${series} returned invalid JSON, keeping previous file if exists"
              git checkout -- "data/${file}.json" 2>/dev/null || true
              FAIL_COUNT=$((FAIL_COUNT+1))
              FAILED_SERIES="${FAILED_SERIES}${series},"
            fi
          }

          fetch_series "VIXCLS"        "vix"
          fetch_series "DTWEXBGS"      "dxy"
          fetch_series "T10Y2Y"        "yield10y2y"
          fetch_series "DCOILWTICO"    "oil"
          fetch_series "CPIAUCSL"      "cpi"
          fetch_series "UNRATE"        "unemployment"
          # BUGFIX: was BAMLH0A0HYM2 (High Yield OAS) but the card's subtitle,
          # zone thresholds (1.5/2.5/3.5%), and citation link were all calibrated
          # for BAMLC0A0CM (Investment Grade OAS) - a materially different, less
          # volatile series. Verified: live HY reading (~2.7%) vs IG reading (~0.78%)
          # on the same date, ~3.5x apart. Switched fetch to match IG, since that's
          # what the existing zones/subtitle/citation were built around.
          fetch_series "BAMLC0A0CM"   "credit"
          fetch_series "WALCL"         "fedbal"
          fetch_series "UMCSENT"       "consumer"
          fetch_series "DGS10"         "treasury10y"
          fetch_series "DGS2"          "treasury2y"
          fetch_series "M2SL"          "m2"
          fetch_series "SP500"         "sp500"
          fetch_series "NASDAQCOM"     "nasdaq"
          # Added per accuracy review: NFCI (Chicago Fed National Financial Conditions
          # Index, weekly Wed) and ICSA (weekly initial jobless claims, Thu) - the two
          # standard weekly-frequency stress/macro series this dashboard lacked.
          fetch_series "NFCI"          "nfci"
          fetch_series "ICSA"          "claims"

          echo "Fetched: $((TOTAL_COUNT-FAIL_COUNT))/${TOTAL_COUNT}. Failed: ${FAILED_SERIES:-none}"

          # meta.json now reflects reality instead of unconditionally claiming "fresh".
          # If FRED_API_KEY is bad or FRED is down, lastUpdated will still update (so you
          # can see the workflow ran) but failedSeries/failedCount will expose that the
          # data itself didn't actually refresh - check this before trusting the dashboard.
          echo '{"lastUpdated":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","fetchedCount":'$((TOTAL_COUNT-FAIL_COUNT))',"totalCount":'${TOTAL_COUNT}',"failedSeries":"'${FAILED_SERIES}'"}' > data/meta.json

          if [ "$FAIL_COUNT" -eq "$TOTAL_COUNT" ]; then
            echo "::error::All ${TOTAL_COUNT} FRED series failed - check FRED_API_KEY secret"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update FRED data [$(date -u +%Y-%m-%d)]"
          for i in 1 2 3; do
            git push && break
            echo "Push rejected (likely another workflow pushed first) - pulling and retrying ($i/3)..."
            git pull --rebase origin main
          done
