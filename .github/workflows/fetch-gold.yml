name: Fetch Gold Data

# REFERENCE POINT ONLY - see conversation record: backtested gold against three known
# stress events (2018 Q4, COVID, 2022) and found it worked as a hedge in only 1 of 3
# (2018), went flat-to-down in COVID's liquidity panic, and fell in the 2022 rate-driven
# selloff. Not reliable enough to be a signpost input. This is a plain price + trend
# display only - it does NOT feed calcComposite/computeSignposts.
#
# Uses GC=F (COMEX gold futures), not the GLD ETF - futures trade ~23hrs/day, which
# actually reflects overnight moves relevant to Part II's premarket question. GLD only
# trades during equity market hours, so it would miss exactly the overnight move that
# matters for "is today likely to open higher or lower."
#
# TO REMOVE: delete this file, delete data/gold.json (optional), and in index.html
# delete the block between "GOLD SECTION START" and "GOLD SECTION END" (CSS/HTML/JS
# each bracketed the same way). Nothing else depends on this.

on:
  schedule:
    # Twice daily: once covering the pre-market window (matches Part II's other feeds),
    # once after US close for the Part I daily-context reading.
    - cron: '0 12 * * 1-5'
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch gold futures (GC=F) price data
        run: |
          mkdir -p data
          python3 << 'PYEOF'
          import json
          import urllib.request
          import datetime

          HEADERS = {"User-Agent": "Mozilla/5.0 (compatible; MarketShockMonitor/1.0)"}
          URL = "https://query1.finance.yahoo.com/v8/finance/chart/GC=F?interval=1d&range=1mo"

          try:
              req = urllib.request.Request(URL, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=15) as r:
                  data = json.load(r)

              result = data["chart"]["result"][0]
              timestamps = result["timestamp"]
              closes = result["indicators"]["quote"][0]["close"]

              points = [(t, c) for t, c in zip(timestamps, closes) if c is not None]
              if len(points) < 2:
                  raise ValueError("not enough data points returned")

              current = points[-1][1]
              prev_close = points[-2][1]
              change_pct = (current - prev_close) / prev_close * 100

              def change_n_days_ago(n):
                  if len(points) <= n:
                      return None
                  past = points[-1 - n][1]
                  return (current - past) / past * 100

              out = {
                  "price": current,
                  "prevClose": prev_close,
                  "changePct": change_pct,
                  "change5d": change_n_days_ago(5),
                  "change20d": change_n_days_ago(20),
                  "_lastUpdated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "_source": "Yahoo Finance (GC=F, COMEX gold futures)",
                  "_fetchFailed": False,
              }
              print(f"OK: GC=F = {current:.2f}, day {change_pct:+.2f}%, 5d {out['change5d']}, 20d {out['change20d']}")

          except Exception as e:
              print(f"FETCH FAILED: {e}")
              out = {"_fetchFailed": True, "_fetchError": str(e),
                     "_lastUpdated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")}

          with open("data/gold.json", "w") as f:
              json.dump(out, f, indent=2)
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gold.json
          git diff --cached --quiet || git commit -m "Update gold futures data [$(date -u +%Y-%m-%d)]"
          for i in 1 2 3; do
            git push && break
            echo "Push rejected (likely another workflow pushed first) - pulling and retrying ($i/3)..."
            git pull --rebase origin main
          done
