name: Fetch Buy/Sell Volume Proxy

on:
  schedule:
    # Every 15 min, 13:00-17:59 UTC, Mon-Fri = ~9:00am-1:59pm ET
    # Covers the first 4 hours of the trading day (9:30am-1:30pm ET) with margin.
    - cron: '*/15 13-17 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute up/down volume proxy
        run: |
          mkdir -p data
          python3 << 'PYEOF'
          import json
          import urllib.request
          import datetime

          # Broad, liquid proxies for "the market" - not individual stocks, since the
          # question was about overall buyer/seller pressure, not any one ticker.
          SYMBOLS = {
              "SPY": "S&P 500",
              "QQQ": "NASDAQ 100",
              "DIA": "Dow 30",
              "IWM": "Russell 2000",
          }

          HEADERS = {"User-Agent": "Mozilla/5.0 (compatible; MarketShockMonitor/1.0)"}

          def classify_volume(ticker):
              """
              Fetches today's 1-min bars and classifies each bar's volume as 'up' or 'down'
              based on whether that bar closed above or below the PRIOR bar's close.
              This is a bar-direction proxy (same family as OBV/UVOL-DVOL), not literal
              tick-by-tick aggressor-side classification (Lee-Ready) - that requires paid
              NBBO quote data no free source provides. Flagged here so it's never confused
              with true buy/sell-tagged volume downstream.
              """
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{ticker}?interval=1m&range=1d"
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=15) as r:
                  data = json.load(r)

              result = data["chart"]["result"][0]
              closes = result["indicators"]["quote"][0]["close"]
              volumes = result["indicators"]["quote"][0]["volume"]
              timestamps = result["timestamp"]

              up_vol, down_vol, flat_vol = 0, 0, 0
              bars_used = 0
              last_bar_ts = None

              for i in range(1, len(closes)):
                  c, v, prev_c = closes[i], volumes[i], closes[i - 1]
                  if c is None or v is None or prev_c is None:
                      continue
                  bars_used += 1
                  last_bar_ts = timestamps[i]
                  if c > prev_c:
                      up_vol += v
                  elif c < prev_c:
                      down_vol += v
                  else:
                      flat_vol += v

              return {
                  "upVolume": up_vol,
                  "downVolume": down_vol,
                  "flatVolume": flat_vol,
                  "barsUsed": bars_used,
                  "lastBarTimestamp": last_bar_ts,
              }

          out = {"symbols": {}}
          failures = []
          total_up, total_down = 0, 0

          for ticker, label in SYMBOLS.items():
              try:
                  r = classify_volume(ticker)
                  out["symbols"][ticker] = {"label": label, **r}
                  total_up += r["upVolume"]
                  total_down += r["downVolume"]
                  print(f"OK  {ticker}: up={r['upVolume']} down={r['downVolume']} bars={r['barsUsed']}")
              except Exception as e:
                  failures.append(ticker)
                  print(f"FAIL {ticker}: {e}")

          out["totalUpVolume"] = total_up
          out["totalDownVolume"] = total_down
          out["upDownRatio"] = round(total_up / total_down, 3) if total_down > 0 else None
          out["_lastUpdated"] = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          out["_failedSymbols"] = failures
          out["_methodology"] = "Bar-direction proxy (1-min bar volume classified by close vs prior close), NOT tick-level aggressor-side (Lee-Ready) volume - that requires paid NBBO quote data."

          with open("data/breadth.json", "w") as f:
              json.dump(out, f, indent=2)

          print(f"\nTotal up={total_up} down={total_down} ratio={out['upDownRatio']}. Failed: {failures}")

          if len(failures) == len(SYMBOLS):
              raise SystemExit("All symbols failed - not committing an empty breadth.json")
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/breadth.json
          git diff --cached --quiet || git commit -m "Update buy/sell volume proxy [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          for i in 1 2 3; do
            git push && break
            echo "Push rejected (likely another workflow pushed first) - pulling and retrying ($i/3)..."
            git pull --rebase origin main
          done
