name: Fetch FINRA Margin Debt Data

on:
  schedule:
    # FINRA publishes ~3 weeks after month-end, so daily checking is wasteful but
    # harmless - the workflow only commits when the file content actually changes.
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Fetch and parse FINRA margin statistics
        run: |
          mkdir -p data
          curl -sL -o /tmp/margin.xlsx "https://www.finra.org/sites/default/files/2021-03/margin-statistics.xlsx"
          python3 << 'PYEOF'
          import json, sys
          from openpyxl import load_workbook

          try:
              wb = load_workbook("/tmp/margin.xlsx", data_only=True)
              ws = wb["Customer Margin Balances"]
              rows = list(ws.iter_rows(min_row=2, values_only=True))
              observations = []
              for row in rows:
                  year_month, debit_balance = row[0], row[1]
                  if year_month is None or debit_balance is None:
                      continue
                  # "Year-Month" column is like "2026-06" - use the 1st of the month as the date
                  observations.append({"date": f"{year_month}-01", "value": debit_balance})
              if not observations:
                  raise ValueError("no rows parsed from FINRA workbook - column layout may have changed")
              json.dump({"observations": observations}, open("data/margin.json", "w"))
              print(f"OK: {len(observations)} observations, latest {observations[0]}")
              print("NOTE: values are in $ millions (FINRA's own convention), matching "
                    "index.html's divide:1000000 config for this tile.")
          except Exception as e:
              print(f"PARSE FAILED: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/margin.json
          git diff --cached --quiet || git commit -m "Update FINRA margin debt data [$(date -u +%Y-%m-%d)]"
          for i in 1 2 3; do
            git push && break
            echo "Push rejected - pulling and retrying ($i/3)..."
            git pull --rebase origin main
          done
